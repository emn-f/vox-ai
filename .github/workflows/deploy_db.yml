name: 🎲 Deploy Database Changes

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy_migrations:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_PROD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID_PROD }}

    steps:
      - name: 📥 Checkout do Código
        uses: actions/checkout@v4

      - name: 🔬 Análise Técnica
        run: |
          echo "📂 ARQUIVOS ENCONTRADOS"
          ls -1 supabase/migrations/*.sql 2>/dev/null || echo "Nenhum arquivo .sql encontrado"
      - name: 🕵️ Debug de Secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "❌ ERRO CRÍTICO: O token SUPABASE_ACCESS_TOKEN está vazio ou não foi carregado!"
            exit 1
          else
            echo "✅ Token carregado"
          fi

      - name: 🛠️ Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 🔗 Link e Push (Produção)
        run: |
          echo "🔌 Conectando ao projeto..."
          supabase link --project-ref $SUPABASE_PROJECT_ID
          
          echo "🚀 Enviando migrações..."
          supabase db push

      - name: 🎉 Sucesso
        if: success()
        run: echo "✅ Banco de dados atualizado com sucesso!"

      - name: ❌ Falha
        if: failure()
        run: echo "🔥 Ocorreu um erro. Verifique os logs."