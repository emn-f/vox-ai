[changelog]
header = """
# 🤖 Vox AI - Changelog

Todas as mudanças no Vox AI serão documentadas neste arquivo.

O formato é baseado em [Keep a Changelog](https://keepachangelog.com/pt-BR/1.0.0/), e este projeto adere ao [Versionamento Semântico](https://semver.org/lang/pt-BR/).

> _Arquivo gerado automaticamente via `git-cliff`._

"""
body = """
{% if version %}
## {{ version }} - {{ timestamp | date(format="%d/%m/%Y") }}
{% else %}
## Unreleased (Próxima Versão)
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
* {{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/emn-f/vox-ai/commit/{{ commit.id }}))
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

tag_pattern = "^v[0-9].*"
ignore_tags = "dev-*"

commit_parsers = [
    { message = "^chore\\(release\\):", skip = true },
    { message = "^chore: sync CHANGELOG", skip = true },

    { message = "^feat", group = "✨ Funcionalidades" },
    { message = "^fix", group = "🐛 Correções" },
    { message = "^doc", group = "📚 Documentação" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^refactor", group = "♻️ Refatoração & Melhorias"},
    { message = "^style", group = "🎨 Estilo e Formatação"},
    { message = "^ci", group = "🤖 CI/CD & Automação"},
    { message = "^build", group = "📦 Build & Dependências"},
    { message = "^chore", group = "🔧 Tarefas Internas"},
    { message = "^test", group = "🧪 Testes Unitários e de Integração"},
]

filter_commits = false
